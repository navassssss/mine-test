services:
  - type: web
    name: kimi-kindle
    env: docker
    rootDir: kindle
    plan: free
    autoDeploy: false
    envVars:
      - key: PORT
        value: "3000"
      - key: MINE_TEST_DOMAIN
        value: "kimi.moonshot.cn"
      - key: BEARER_TOKEN
        sync: false
      - key: MINE_TEST_AUTH_COOKIE
        sync: false
      - key: CF_BM
        sync: false
      - key: X_MSH_SHIELD_DATA
        sync: false
      - key: X_MSH_SESSION_ID
        sync: false
      - key: X_MSH_DEVICE_ID
        sync: false
      - key: X_TRAFFIC_ID
        sync: false
